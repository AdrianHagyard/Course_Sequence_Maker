<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
        <title>View</title>
        <link rel="stylesheet" href="../docs/assets/css/view.css">
        <script defer src="../docs/assets/js/view.js"></script>
    </head>

    <body>
        <div class="container">
            <div class="year" id="year1">
                <div class="term" id="term1">
                    <div id="course1"></div>
                    <div id="course2"></div>
                    <div id="course3"></div>
                    <div id="course4"></div>
                    <div id="course5"></div>
                </div>
                <div class="term" id="term2">
                    <div id="course1"></div>
                    <div id="course2"></div>
                    <div id="course3"></div>
                    <div id="course4"></div>
                    <div id="course5"></div>
                </div>
            </div>

            <div class="infoBox">
                <div id="hoverInfo">
                    <h1>Course hovered over in slot:</h1>
                    <h2>Name: </h2>
                    <p>Code: </p>
                    <p>Year: </p>
                    <p>Term: </p>
                    <p>Slot: </p>
                </div>
                <hr>
                <div id="clickedInfo">
                    <h1>Course clicked in search:</h1>
                    <h2>Name: </h2>
                    <p>Code: </p>
                </div>
            </div>

            <div class="coursesBox">
                <form>
                    <label for="courseSearch">Search Courses:</label>
                    <input type="search" id="courseSearch" name="courseSearch">
                    <input type="submit" value="Search">
                </form>
                <div id="shownCourses" class="scrollBox">
                    <ul>
                        <li><span id="COMP1005">Introduction to Computer Science <span aria-label="1">&#8544;</span></span></li>
                        <li><span id="COMP1006">Introduction to Computer Science <span aria-label="2">&#8544;&#8544;</span></span></li>
                    </ul>
                </div>
            </div>
        </div>
    </body>
</html>

<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
        <title>View</title>
        <script src="../docs/assets/js/view.js"></script>
        <link rel="stylesheet" href="../docs/assets/css/view.css">
    </head>

    <body>
        <div id="slot" ondrop="dragDrop(event)" ondragover="dragStop(event)"></div>
        <h1 id="dragText" draggable="true" ondragstart="dragStart(event)">Drag this!</h1>
    </body>
</html>
